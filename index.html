<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AryterLog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#080b10; --surface:#0d1117; --surface2:#111820; --surface3:#161d27;
      --text:#d0dbe8; --text2:#7a8a9a; --accent:#00ff88; --accent2:#0ea5e9;
      --danger:#ff4560; --border:#1e2a38; --border2:#2a3848; --code-bg:#0a0f16;
      --glow:rgba(0,255,136,0.08); --glow2:rgba(0,255,136,0.18);
    }
    .light {
      --bg:#f5f7fa; --surface:#ffffff; --surface2:#f0f4f8; --surface3:#e8eef5;
      --text:#111827; --text2:#6b7280; --accent:#059669; --accent2:#0284c7;
      --danger:#dc2626; --border:#e2e8f0; --border2:#cbd5e1; --code-bg:#f1f5f9;
      --glow:rgba(5,150,105,0.07); --glow2:rgba(5,150,105,0.14);
    }
    .eye-saver {
      --bg:#12100a; --surface:#1a1608; --surface2:#211c0c; --surface3:#282210;
      --text:#e8d8b0; --text2:#9a8860; --accent:#f5c542; --accent2:#e08030;
      --danger:#e05050; --border:#302810; --border2:#3d3418; --code-bg:#0f0d06;
      --glow:rgba(245,197,66,0.08); --glow2:rgba(245,197,66,0.18);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}

    body {
      font-family:'Fira Code',monospace;
      background:var(--bg); color:var(--text);
      min-height:100vh; overflow-x:hidden;
      transition:background 0.4s,color 0.4s;
    }

    /* Grid bg */
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size:44px 44px; opacity:0.25;
    }

    /* ── SIDEBAR ── */
    .sidebar-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:500;
      opacity:0; pointer-events:none; transition:opacity 0.3s; backdrop-filter:blur(4px);
    }
    .sidebar-overlay.active{opacity:1;pointer-events:all;}

    .sidebar {
      position:fixed; top:0; left:0; bottom:0; width:285px;
      background:var(--surface); border-right:1px solid var(--border2);
      z-index:600; display:flex; flex-direction:column;
      transform:translateX(-100%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .sidebar.open{transform:translateX(0);}
    .sidebar::after {
      content:''; position:absolute; top:0; right:-1px; bottom:0; width:1px;
      background:linear-gradient(to bottom,transparent,var(--accent),transparent);
      opacity:0; transition:opacity 0.4s 0.3s;
    }
    .sidebar.open::after{opacity:1;}

    .sidebar-header {
      display:flex; justify-content:flex-end; align-items:center;
      padding:14px 16px; border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .sidebar-close-btn {
      background:transparent; border:1px solid var(--border2); color:var(--text2);
      width:28px; height:28px; padding:0; border-radius:5px; cursor:pointer;
      font-size:13px; display:flex; align-items:center; justify-content:center;
      font-family:'Fira Code',monospace; transition:all 0.2s;
    }
    .sidebar-close-btn:hover{border-color:var(--danger);color:var(--danger);background:rgba(255,69,96,0.08);}

    .sb-section{border-bottom:1px solid var(--border);}
    .sb-section-toggle {
      display:flex; justify-content:space-between; align-items:center;
      padding:13px 16px; cursor:pointer;
      font-family:'Fira Code',monospace; font-size:10px; font-weight:500;
      letter-spacing:2.5px; text-transform:uppercase; color:var(--text2);
      user-select:none; transition:color 0.2s,background 0.2s;
    }
    .sb-section-toggle:hover{color:var(--accent);background:var(--glow);}
    .sb-label{display:flex;align-items:center;gap:8px;}
    .sb-label::before {
      content:''; display:inline-block; width:5px; height:5px; border-radius:50%;
      background:var(--accent); box-shadow:0 0 5px var(--accent); opacity:0.4; transition:opacity 0.2s;
    }
    .sb-section.open .sb-label::before{opacity:1;}
    .sb-arrow{font-size:10px;transition:transform 0.25s;display:inline-block;color:var(--text2);}
    .sb-section.open .sb-arrow{transform:rotate(180deg);color:var(--accent);}

    .sb-section-body {
      overflow:hidden; max-height:0;
      transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1),padding 0.3s;
      padding:0 16px;
    }
    .sb-section.open .sb-section-body{max-height:60vh;overflow-y:auto;padding:4px 16px 14px;}
    .sb-section-body::-webkit-scrollbar{width:3px;}
    .sb-section-body::-webkit-scrollbar-track{background:transparent;}
    .sb-section-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

    .category-list{display:flex;flex-wrap:wrap;gap:6px;padding-top:8px;}
    .cat-chip {
      display:inline-flex; align-items:center; gap:4px; padding:4px 9px;
      border-radius:4px; border:1px solid var(--border2); background:var(--surface2);
      color:var(--text2); font-family:'Fira Code',monospace; font-size:10px;
      font-weight:500; cursor:pointer; transition:all 0.18s; user-select:none;
    }
    .cat-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--glow);}
    .cat-chip.selected{border-color:var(--accent);background:var(--glow2);color:var(--accent);box-shadow:0 0 8px var(--glow2);}
    .cat-count{opacity:0.5;font-size:9px;}

    .social-list{display:flex;flex-direction:column;gap:6px;padding-top:8px;}
    .social-link {
      display:flex; align-items:center; gap:10px; padding:10px 11px;
      border-radius:7px; border:1px solid var(--border); background:var(--surface2);
      text-decoration:none; color:var(--text); transition:all 0.2s; position:relative; overflow:hidden;
    }
    .social-link::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:2px;
      background:var(--accent); transform:scaleY(0); transition:transform 0.2s;
    }
    .social-link:hover{border-color:var(--accent);background:var(--glow);color:var(--accent);}
    .social-link:hover::before{transform:scaleY(1);}
    .social-link:hover .social-ext{opacity:1;transform:translate(2px,-2px);}
    .social-icon{font-size:18px;flex-shrink:0;}
    .social-info{display:flex;flex-direction:column;flex:1;min-width:0;}
    .social-name{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;line-height:1.2;}
    .social-handle{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .social-ext{font-size:12px;opacity:0.3;flex-shrink:0;transition:all 0.2s;}

    .sidebar-footer{padding:13px 16px;border-top:1px solid var(--border);flex-shrink:0;margin-top:auto;}
    .clear-btn {
      width:100%;justify-content:center;background:transparent;border:1px solid var(--border2);
      color:var(--text2);padding:8px;border-radius:6px;font-size:11px;cursor:pointer;
      font-family:'Fira Code',monospace;font-weight:500;letter-spacing:0.5px;
      transition:all 0.2s;display:flex;align-items:center;gap:6px;
    }
    .clear-btn:hover{border-color:var(--danger);color:var(--danger);background:rgba(255,69,96,0.07);}

    /* ── HEADER ── */
    header {
      position:sticky; top:0; z-index:200;
      background:rgba(8,11,16,0.86); backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 22px; height:56px; gap:12px;
    }
    .light header{background:rgba(245,247,250,0.9);}
    .eye-saver header{background:rgba(18,16,10,0.9);}
    header::after {
      content:''; position:absolute; bottom:-1px; left:8%; right:8%; height:1px;
      background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0.35;
    }
    .header-left{display:flex;align-items:center;gap:12px;flex-shrink:0;}

    .hamburger {
      display:flex; flex-direction:column; justify-content:center; gap:4px;
      width:32px; height:32px; padding:6px; background:transparent;
      border:1px solid var(--border2); border-radius:6px; cursor:pointer; flex-shrink:0; transition:all 0.2s;
    }
    .hamburger span{display:block;width:100%;height:1.5px;background:var(--text2);border-radius:2px;transition:all 0.2s;}
    .hamburger:hover{border-color:var(--accent);}
    .hamburger:hover span{background:var(--accent);}

    .logo {
      font-family:'Bebas Neue',sans-serif; font-size:24px; font-weight:400;
      letter-spacing:3px; color:var(--text); cursor:pointer; white-space:nowrap;
      flex-shrink:0; line-height:1; transition:color 0.2s;
    }
    .logo .lo-a{color:var(--accent);}
    .logo:hover .lo-a{text-shadow:0 0 14px var(--accent);}

    #theme-btn {
      background:transparent; border:1px solid var(--border2);
      padding:5px 11px; cursor:pointer; color:var(--text2); border-radius:6px;
      transition:all 0.2s; font-family:'Fira Code',monospace; font-size:11px;
      display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
    }
    #theme-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--glow);}

    @keyframes popSpin{0%{transform:scale(0.4) rotate(-60deg);opacity:0;}70%{transform:scale(1.15) rotate(5deg);}100%{transform:scale(1) rotate(0deg);opacity:1;}}
    .emoji{display:inline-block;}

    /* ── HERO ── */
    .hero{position:relative;z-index:1;padding:44px 22px 32px;max-width:820px;margin:0 auto;}
    .hero-tag {
      display:inline-flex; align-items:center; gap:8px;
      font-family:'Fira Code',monospace; font-size:10px; letter-spacing:2px;
      text-transform:uppercase; color:var(--accent); margin-bottom:14px;
    }
    .hero-tag::before{content:'';display:inline-block;width:18px;height:1px;background:var(--accent);}

    .hero h2 {
      font-family:'Space Grotesk',sans-serif;
      font-size:clamp(26px,5vw,40px); font-weight:700; line-height:1.15;
      color:var(--text); margin-bottom:12px;
    }
    .hero h2 em{font-style:normal;color:var(--accent);}
    .hero-sub{font-family:'Fira Code',monospace;font-size:12px;color:var(--text2);line-height:1.7;max-width:460px;}
    .cursor{display:inline-block;width:7px;height:13px;background:var(--accent);vertical-align:middle;margin-left:2px;animation:blink 1.1s step-end infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    /* ── CONTAINER ── */
    .container{max-width:820px;margin:0 auto;padding:0 20px 60px;position:relative;z-index:1;}

    /* ── SEARCH ── */
    .search-wrapper{margin-bottom:26px;position:relative;}
    .search-prefix{
      position:absolute;left:14px;top:50%;transform:translateY(-50%);
      color:var(--accent);font-family:'Fira Code',monospace;font-size:13px;
      font-weight:500;pointer-events:none;user-select:none;
    }
    #search-bar {
      width:100%;padding:12px 16px 12px 38px;font-size:13px;border-radius:8px;
      border:1px solid var(--border2);background:var(--surface);color:var(--text);
      font-family:'Fira Code',monospace;transition:border-color 0.25s,box-shadow 0.25s;
    }
    #search-bar::placeholder{color:var(--text2);opacity:0.7;}
    #search-bar:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--glow),0 0 18px var(--glow);}

    /* ── SECTION LABEL ── */
    .section-label {
      display:flex;align-items:center;gap:10px;
      font-family:'Fira Code',monospace;font-size:10px;letter-spacing:2.5px;
      text-transform:uppercase;color:var(--text2);margin-bottom:14px;
    }
    .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

    /* Active filter bar */
    .filter-active-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px;font-size:11px;color:var(--text2);}
    .active-chip {
      display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;
      background:var(--glow2);border:1px solid var(--accent);color:var(--accent);
      font-size:10px;font-weight:500;cursor:pointer;font-family:'Fira Code',monospace;transition:opacity 0.2s;
    }
    .active-chip:hover{opacity:0.7;}

    /* ── POST CARDS ── */
    @keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

    .post-card {
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      padding:20px 22px; margin-bottom:9px; cursor:pointer;
      position:relative; overflow:hidden;
      transition:border-color 0.25s,box-shadow 0.25s,transform 0.2s;
      animation:cardIn 0.35s ease both;
    }
    .post-card:nth-child(1){animation-delay:0.03s;} .post-card:nth-child(2){animation-delay:0.07s;}
    .post-card:nth-child(3){animation-delay:0.11s;} .post-card:nth-child(4){animation-delay:0.15s;}
    .post-card:nth-child(5){animation-delay:0.19s;} .post-card:nth-child(6){animation-delay:0.23s;}
    .post-card:nth-child(7){animation-delay:0.27s;}

    .post-card::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse at 0% 50%,var(--glow2) 0%,transparent 65%);
      opacity:0; transition:opacity 0.3s; pointer-events:none;
    }
    .post-card::after {
      content:''; position:absolute; left:0; top:14px; bottom:14px; width:2px;
      background:var(--accent); border-radius:2px;
      transform:scaleY(0); transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
      transform-origin:center;
    }
    .post-card:hover{border-color:var(--border2);box-shadow:0 4px 24px rgba(0,0,0,0.28);transform:translateX(4px);}
    .post-card:hover::before{opacity:1;}
    .post-card:hover::after{transform:scaleY(1);}

    .post-card h2 {
      font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:600;
      color:var(--text); margin-bottom:7px; line-height:1.35; transition:color 0.2s;
    }
    .post-card:hover h2{color:var(--accent);}

    .post-meta-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:8px;}
    .meta-date{font-family:'Fira Code',monospace;font-size:10px;color:var(--text2);}
    .meta-dot{color:var(--border2);font-size:10px;}
    .card-cat-chip {
      display:inline-flex;align-items:center;padding:1px 7px;border-radius:3px;
      border:1px solid var(--border2);background:var(--surface2);color:var(--text2);
      font-size:9px;font-family:'Fira Code',monospace;font-weight:500;letter-spacing:0.4px;
      transition:border-color 0.2s,color 0.2s;
    }
    .post-card:hover .card-cat-chip{border-color:var(--accent);color:var(--accent);}

    .post-card p{font-family:'Fira Code',monospace;font-size:12px;color:var(--text2);line-height:1.7;}
    .post-card-arrow {
      position:absolute;right:18px;top:50%;transform:translateY(-50%) translateX(6px);
      font-size:15px;color:var(--accent);opacity:0;transition:all 0.2s;
    }
    .post-card:hover .post-card-arrow{opacity:1;transform:translateY(-50%) translateX(0);}

    /* ── PAGINATION ── */
    .pagination{display:flex;justify-content:center;align-items:center;gap:5px;margin-top:28px;flex-wrap:wrap;}
    .page-btn {
      background:var(--surface);border:1px solid var(--border2);color:var(--text2);
      padding:6px 12px;border-radius:6px;cursor:pointer;font-family:'Fira Code',monospace;
      font-size:12px;font-weight:500;transition:all 0.2s;min-width:34px;text-align:center;
      display:inline-flex;align-items:center;justify-content:center;
    }
    .page-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:var(--glow);}
    .page-btn.active{border-color:var(--accent);background:var(--glow2);color:var(--accent);box-shadow:0 0 10px var(--glow2);}
    .page-btn:disabled{opacity:0.22;cursor:not-allowed;}
    .page-info{text-align:center;margin-top:8px;font-family:'Fira Code',monospace;font-size:10px;color:var(--text2);letter-spacing:0.5px;}

    /* ── POST CONTENT ── */
    .back-btn {
      display:inline-flex;align-items:center;gap:7px;margin-bottom:20px;
      background:var(--surface);border:1px solid var(--border2);color:var(--text2);
      padding:7px 13px;border-radius:6px;font-family:'Fira Code',monospace;font-size:11px;
      cursor:pointer;transition:all 0.2s;text-decoration:none;
    }
    .back-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--glow);}

    .post-content {
      background:var(--surface);border:1px solid var(--border);border-radius:12px;
      padding:34px 30px;position:relative;overflow:hidden;
    }
    .post-content::before {
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,var(--accent),var(--accent2),transparent);
      border-radius:12px 12px 0 0;
    }
    .post-content *{max-width:100%;}

    .post-content h1 {
      font-family:'Space Grotesk',sans-serif;font-size:clamp(19px,4vw,26px);
      font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.25;word-break:break-word;
    }
    .post-header-meta{
      font-family:'Fira Code',monospace;font-size:11px;color:var(--text2);
      padding-bottom:18px;margin-bottom:22px;border-bottom:1px solid var(--border);
    }
    .post-content h2,.post-content h3{font-family:'Space Grotesk',sans-serif;font-weight:600;color:var(--text);margin:26px 0 10px;word-break:break-word;}
    .post-content h2{font-size:19px;}
    .post-content h3{font-size:15px;color:var(--accent);}
    .post-content p{font-size:14px;line-height:1.8;margin-bottom:14px;color:var(--text);}
    .post-content ul,.post-content ol{padding-left:20px;margin-bottom:14px;font-size:14px;line-height:1.8;}
    .post-content li{margin-bottom:4px;}

    a{color:var(--accent);word-break:break-all;overflow-wrap:break-word;transition:opacity 0.2s;}
    a:hover{opacity:0.75;}
    .post-content a{text-decoration:underline;text-underline-offset:3px;}

    code {
      background:var(--code-bg);border:1px solid var(--border);padding:2px 6px;
      border-radius:4px;font-family:'Fira Code',monospace;font-size:0.85em;
      color:var(--accent);word-break:break-all;overflow-wrap:break-word;
    }
    pre {
      background:var(--code-bg);border:1px solid var(--border);padding:18px;border-radius:8px;
      overflow-x:auto;max-width:100%;-webkit-overflow-scrolling:touch;
      position:relative;margin-bottom:14px;
    }
    pre::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,var(--accent),var(--accent2),transparent);
      opacity:0.5;border-radius:8px 8px 0 0;
    }
    pre code{
      background:transparent;border:none;padding:0;word-break:normal;
      overflow-wrap:normal;white-space:pre;display:block;
      font-size:13px;line-height:1.65;color:var(--text);
    }
    blockquote{
      border-left:2px solid var(--accent);margin:14px 0;padding:10px 16px;
      background:var(--glow);border-radius:0 6px 6px 0;font-style:italic;color:var(--text2);
    }
    table{width:100%;border-collapse:collapse;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;font-size:13px;margin-bottom:14px;}
    th,td{border:1px solid var(--border);padding:8px 12px;text-align:left;white-space:nowrap;}
    th{background:var(--surface2);color:var(--accent);font-weight:600;}
    .post-content img{max-width:100%;height:auto;border-radius:8px;display:block;margin:14px 0;}

    .copy-btn {
      position:absolute;top:9px;right:9px;padding:3px 8px;font-size:10px;
      font-family:'Fira Code',monospace;font-weight:500;background:var(--surface2);
      border:1px solid var(--border2);color:var(--text2);border-radius:4px;cursor:pointer;
      transition:all 0.2s;opacity:0;letter-spacing:0.3px;
    }
    pre:hover .copy-btn{opacity:1;}
    .copy-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--glow);}
    .copy-btn.copied{border-color:var(--accent);color:var(--accent);opacity:1;}

    /* ── FOOTER ── */
    footer{
      text-align:center;padding:22px 16px;color:var(--text2);
      font-family:'Fira Code',monospace;font-size:11px;
      border-top:1px solid var(--border);position:relative;z-index:1;
    }
    .f-accent{color:var(--accent);}

    .loading{text-align:center;padding:48px 16px;color:var(--text2);font-size:13px;font-family:'Fira Code',monospace;}
    .error{text-align:center;padding:40px 16px;color:var(--danger);font-size:13px;}
    .hidden{display:none!important;}

    @media(max-width:480px){
      header{padding:0 13px;height:50px;}
      .logo{font-size:21px;letter-spacing:2px;}
      .hero{padding:24px 14px 18px;}
      .hero h2{font-size:22px;}
      .container{padding:0 13px 44px;}
      .post-card{padding:15px 16px;}
      .post-card-arrow{display:none;}
      .post-content{padding:20px 14px;}
      pre{padding:13px;}
    }
  </style>
</head>
<body>

  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <button id="sidebar-close" class="sidebar-close-btn">✕</button>
    </div>

    <div class="sb-section" id="sec-category">
      <div class="sb-section-toggle" id="toggle-category">
        <span class="sb-label">Category</span>
        <span class="sb-arrow">▾</span>
      </div>
      <div class="sb-section-body">
        <div id="category-list" class="category-list">
          <span style="color:var(--text2);font-size:11px;">Loading...</span>
        </div>
      </div>
    </div>

    <div class="sb-section" id="sec-socials">
      <div class="sb-section-toggle" id="toggle-socials">
        <span class="sb-label">My Socials</span>
        <span class="sb-arrow">▾</span>
      </div>
      <div class="sb-section-body">
        <div class="social-list" id="social-list">
          <span style="color:var(--text2);font-size:11px;">Loading...</span>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button id="clear-filters" class="clear-btn">✕&nbsp; Clear filters</button>
    </div>
  </aside>

  <header>
    <div class="header-left">
      <button id="hamburger" class="hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <h1 class="logo" onclick="window.location.hash=''">Aryter<span class="lo-a">Log</span></h1>
    </div>
    <button id="theme-btn" aria-label="Cycle Theme">
      <span class="emoji" id="theme-emoji">🌙</span>
      <span id="theme-label">Dark</span>
    </button>
  </header>

  <div id="hero-section" class="hero">
    <div class="hero-tag">Security Research &amp; Red Team</div>
    <h2>Learning. Building.<br><em>Breaking.</em></h2>
    <p class="hero-sub">Offensive security write-ups, red team tooling &amp; cybersecurity research by Aryan Giri<span class="cursor"></span></p>
  </div>

  <main class="container">
    <div id="home-view">
      <div class="search-wrapper">
        <span class="search-prefix">&gt;_</span>
        <input type="text" id="search-bar" placeholder="search posts...">
      </div>
      <div class="section-label">Recent Posts</div>
      <div id="active-filter-bar"></div>
      <div id="post-list"></div>
      <div id="pagination" class="pagination"></div>
      <div id="page-info" class="page-info"></div>
    </div>

    <div id="post-view" class="hidden">
      <button class="back-btn" onclick="window.location.hash=''">← Back</button>
      <article id="post-content-container" class="post-content"></article>
    </div>
  </main>

  <footer>
    <span class="f-accent">$</span> echo "Made by <span class="f-accent">Aryan Giri</span>" &nbsp;·&nbsp; Learning. Building. Breaking. ⚡
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    /* 1. THEME */
    const themes=["dark","light","eye-saver"];
    const themeData={"dark":{emoji:"🌙",label:"Dark"},"light":{emoji:"☀️",label:"Light"},"eye-saver":{emoji:"☕",label:"Reading"}};
    function setCookie(n,v,d){const e=new Date();e.setTime(e.getTime()+d*86400000);document.cookie=`${n}=${v};expires=${e.toUTCString()};path=/`;}
    function getCookie(n){const m=document.cookie.match(new RegExp('(^| )'+n+'=([^;]+)'));return m?m[2]:null;}
    let currentTheme=getCookie("site_theme")||"dark";
    const themeBtn=document.getElementById("theme-btn");
    const themeEmoji=document.getElementById("theme-emoji");
    function applyTheme(theme,animate=false){
      document.body.className=theme==="dark"?"":theme;
      themeEmoji.textContent=themeData[theme].emoji;
      document.getElementById("theme-label").textContent=themeData[theme].label;
      setCookie("site_theme",theme,365);
      if(animate){themeEmoji.style.animation="none";themeEmoji.offsetHeight;themeEmoji.style.animation="popSpin 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards";}
    }
    applyTheme(currentTheme);
    themeBtn.addEventListener("click",()=>{currentTheme=themes[(themes.indexOf(currentTheme)+1)%themes.length];applyTheme(currentTheme,true);});

    /* 2. SIDEBAR */
    const sidebar=document.getElementById("sidebar");
    const sidebarOverlay=document.getElementById("sidebar-overlay");
    const hamburger=document.getElementById("hamburger");
    const sidebarCloseBtn=document.getElementById("sidebar-close");
    const categoryListEl=document.getElementById("category-list");
    const clearFiltersBtn=document.getElementById("clear-filters");
    const activeFilterBar=document.getElementById("active-filter-bar");
    let selectedCategories=new Set();

    function openSidebar(){sidebar.classList.add("open");sidebarOverlay.classList.add("active");}
    function closeSidebar(){sidebar.classList.remove("open");sidebarOverlay.classList.remove("active");}
    hamburger.addEventListener("click",openSidebar);
    sidebarCloseBtn.addEventListener("click",closeSidebar);
    sidebarOverlay.addEventListener("click",closeSidebar);

    document.querySelectorAll(".sb-section-toggle").forEach(t=>{
      t.addEventListener("click",()=>t.parentElement.classList.toggle("open"));
    });

    clearFiltersBtn.addEventListener("click",()=>{
      selectedCategories.clear();
      categoryListEl.querySelectorAll(".cat-chip").forEach(c=>c.classList.remove("selected"));
      renderPostCards(searchBar.value,1);
    });

    function buildCategoryChips(){
      const countMap={};
      blogPosts.forEach(p=>{
        const cats=Array.isArray(p.category)?p.category:(p.category?[p.category]:[]);
        cats.forEach(c=>{countMap[c]=(countMap[c]||0)+1;});
      });
      const cats=Object.keys(countMap).sort();
      categoryListEl.innerHTML="";
      if(!cats.length){categoryListEl.innerHTML=`<span style="color:var(--text2);font-size:11px;">No categories</span>`;return;}
      cats.forEach(cat=>{
        const chip=document.createElement("div");
        chip.className="cat-chip"+(selectedCategories.has(cat)?" selected":"");
        chip.innerHTML=`${cat} <span class="cat-count">${countMap[cat]}</span>`;
        chip.onclick=()=>{
          if(selectedCategories.has(cat)){selectedCategories.delete(cat);chip.classList.remove("selected");}
          else{selectedCategories.add(cat);chip.classList.add("selected");}
          renderPostCards(searchBar.value,1);
        };
        categoryListEl.appendChild(chip);
      });
    }

    function buildSocialLinks(socials){
      const el=document.getElementById("social-list");
      if(!socials||!socials.length){el.innerHTML=`<span style="color:var(--text2);font-size:11px;">No socials found.</span>`;return;}
      el.innerHTML=socials.map(s=>`
        <a href="${s.url}" target="_blank" rel="noopener noreferrer" class="social-link">
          <span class="social-icon">${s.icon}</span>
          <div class="social-info">
            <span class="social-name">${s.name}</span>
            <span class="social-handle">${s.handle}</span>
          </div>
          <span class="social-ext">↗</span>
        </a>`).join("");
    }

    function renderActiveFilterBar(){
      activeFilterBar.innerHTML="";
      if(!selectedCategories.size)return;
      const bar=document.createElement("div");
      bar.className="filter-active-bar";
      bar.innerHTML=`<span>Filtered:</span>`;
      selectedCategories.forEach(cat=>{
        const chip=document.createElement("span");
        chip.className="active-chip";
        chip.innerHTML=`${cat} <span>✕</span>`;
        chip.onclick=()=>{
          selectedCategories.delete(cat);
          categoryListEl.querySelectorAll(".cat-chip").forEach(c=>{if(c.textContent.trim().startsWith(cat))c.classList.remove("selected");});
          renderPostCards(searchBar.value,1);
        };
        bar.appendChild(chip);
      });
      activeFilterBar.appendChild(bar);
    }

    /* 3. POSTS & PAGINATION */
    const listContainer=document.getElementById("post-list");
    const paginationEl=document.getElementById("pagination");
    const pageInfoEl=document.getElementById("page-info");
    const searchBar=document.getElementById("search-bar");
    const heroSection=document.getElementById("hero-section");
    let blogPosts=[],currentPage=1,currentQuery="";
    const POSTS_PER_PAGE=7;

    function renderPostCards(filterQuery="",page=1){
      currentQuery=filterQuery; currentPage=page;
      listContainer.innerHTML=""; paginationEl.innerHTML=""; pageInfoEl.innerHTML="";
      renderActiveFilterBar();
      const lq=filterQuery.toLowerCase();
      const filtered=blogPosts.filter(p=>{
        const ok=p.title.toLowerCase().includes(lq)||p.summary.toLowerCase().includes(lq);
        if(!ok)return false;
        if(!selectedCategories.size)return true;
        const pc=Array.isArray(p.category)?p.category:(p.category?[p.category]:[]);
        return[...selectedCategories].every(sc=>pc.includes(sc));
      });
      if(!filtered.length){listContainer.innerHTML=`<div class="loading">No posts found${filterQuery?` for "<em>${filterQuery}</em>"`:""}${selectedCategories.size?" with selected filters":""}.</div>`;return;}
      const totalPages=Math.ceil(filtered.length/POSTS_PER_PAGE);
      currentPage=Math.max(1,Math.min(page,totalPages));
      const start=(currentPage-1)*POSTS_PER_PAGE;
      const slice=filtered.slice(start,start+POSTS_PER_PAGE);
      slice.forEach(post=>{
        const cats=Array.isArray(post.category)?post.category:(post.category?[post.category]:[]);
        const catHTML=cats.map(c=>`<span class="card-cat-chip">${c}</span>`).join("");
        const card=document.createElement("div");
        card.className="post-card";
        card.onclick=()=>window.location.hash=`post-${post.id}`;
        card.innerHTML=`
          <h2>${post.title}</h2>
          <div class="post-meta-row">
            <span class="meta-date">📅 ${post.date}</span>
            ${catHTML?`<span class="meta-dot">·</span>${catHTML}`:""}
          </div>
          <p>${post.summary}</p>
          <span class="post-card-arrow">→</span>`;
        listContainer.appendChild(card);
      });
      if(totalPages>1){
        const addBtn=(label,pg,isActive=false,isDisabled=false)=>{
          const btn=document.createElement("button");
          btn.className="page-btn"+(isActive?" active":"");
          btn.textContent=label; btn.disabled=isDisabled;
          if(!isDisabled)btn.onclick=()=>{renderPostCards(currentQuery,pg);window.scrollTo(0,0);};
          paginationEl.appendChild(btn);
        };
        addBtn("←",currentPage-1,false,currentPage===1);
        let vp=[];
        if(totalPages<=3){for(let i=1;i<=totalPages;i++)vp.push(i);}
        else if(currentPage===1)vp=[1,2,3];
        else if(currentPage===totalPages)vp=[totalPages-2,totalPages-1,totalPages];
        else vp=[currentPage-1,currentPage,currentPage+1];
        vp.forEach(p=>addBtn(p,p,p===currentPage));
        addBtn("→",currentPage+1,false,currentPage===totalPages);
        const from=start+1,to=Math.min(start+POSTS_PER_PAGE,filtered.length);
        pageInfoEl.textContent=`${from}–${to} of ${filtered.length} posts`;
      }
    }
    searchBar.addEventListener("input",e=>renderPostCards(e.target.value,1));

    /* 4. ROUTING */
    const homeView=document.getElementById("home-view");
    const postView=document.getElementById("post-view");
    const postContent=document.getElementById("post-content-container");
    marked.setOptions({breaks:true,gfm:true});

    async function loadFullPost(postId){
      const meta=blogPosts.find(p=>p.id===postId);
      if(!meta){postContent.innerHTML=`<div class="error">⚠️ Post not found.</div>`;return;}
      postContent.innerHTML=`<div class="loading">⟳ Loading...</div>`;
      try{
        const res=await fetch(meta.file);
        if(!res.ok)throw new Error("File not found");
        const md=await res.text();
        postContent.innerHTML=`<h1>${meta.title}</h1><div class="post-header-meta">📅 Published ${meta.date}</div>${marked.parse(md)}`;
        postContent.querySelectorAll("a").forEach(l=>{l.setAttribute("target","_blank");l.setAttribute("rel","noopener noreferrer");});
        postContent.querySelectorAll("pre").forEach(pre=>{
          const code=pre.querySelector("code");
          if(!code)return;
          const btn=document.createElement("button");
          btn.className="copy-btn"; btn.textContent="copy";
          btn.onclick=async()=>{
            try{await navigator.clipboard.writeText(code.innerText.trimEnd());}
            catch{const s=window.getSelection(),r=document.createRange();r.selectNodeContents(code);s.removeAllRanges();s.addRange(r);document.execCommand("copy");s.removeAllRanges();}
            btn.textContent="✓ copied";btn.classList.add("copied");
            setTimeout(()=>{btn.textContent="copy";btn.classList.remove("copied");},2000);
          };
          pre.appendChild(btn);
        });
      }catch(err){postContent.innerHTML=`<div class="error"><p>⚠️ Could not load post.</p><code>${meta.file}</code></div>`;}
    }

    function handleRoute(){
      const hash=window.location.hash;
      if(hash.startsWith("#post-")){
        homeView.classList.add("hidden"); heroSection.style.display="none";
        postView.classList.remove("hidden");
        loadFullPost(hash.replace("#post-",""));
        window.scrollTo(0,0);
      }else{
        postView.classList.add("hidden"); heroSection.style.display="";
        homeView.classList.remove("hidden");
        renderPostCards(searchBar.value,1);
      }
    }

    /* 5. BOOT */
    async function init(){
      listContainer.innerHTML=`<div class="loading">⟳ Loading posts...</div>`;
      try{
        const[postsRes,socialsRes]=await Promise.all([fetch("posts-info.json"),fetch("socials.json")]);
        if(!postsRes.ok)throw new Error("posts-info.json not found");
        blogPosts=await postsRes.json();
        buildCategoryChips();
        if(socialsRes.ok)buildSocialLinks(await socialsRes.json());
      }catch(err){
        listContainer.innerHTML=`<div class="error">⚠️ Could not load posts-info.json<br><small>${err.message}</small></div>`;
        return;
      }
      window.addEventListener("hashchange",handleRoute);
      handleRoute();
    }
    init();
  </script>
</body>
</html>
