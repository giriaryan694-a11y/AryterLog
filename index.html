<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AryterLog</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* 1. Dark Theme (Default) */
    :root {
      --bg: #0d1117;
      --text: #e6edf3;
      --card: #161b22;
      --accent: #3fb950;
      --border: #30363d;
      --code-bg: #222;
    }

    /* 2. Light Theme */
    .light {
      --bg: #ffffff;
      --text: #111;
      --card: #f5f5f5;
      --accent: #007bff;
      --border: #eaeaea;
      --code-bg: #e0e0e0;
    }

    /* 3. Eye Saver Theme (Warm/Sepia) */
    .eye-saver {
      --bg: #fdf6e3;
      --text: #4b5258;
      --card: #eee8d5;
      --accent: #b58900;
      --border: #d3c6a6;
      --code-bg: #e6dfcb;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background-color 0.4s ease, color 0.4s ease;
      line-height: 1.6;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.4s ease;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    /* Theme Button Styling */
    button {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 8px 16px;
      cursor: pointer;
      color: var(--text);
      border-radius: 6px;
      transition: all 0.2s ease;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      filter: brightness(1.1);
    }

    /* Emoji Animation Keyframes */
    @keyframes popSpin {
      0% { transform: scale(0.5) rotate(-45deg); opacity: 0; }
      50% { transform: scale(1.2) rotate(10deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .emoji {
      display: inline-block;
      font-size: 1.2em;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 40px 20px;
    }

    .post {
      background: var(--card);
      padding: 30px;
      margin-bottom: 24px;
      border-radius: 10px;
      border: 1px solid var(--border);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.4s ease;
    }

    .post:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .post h1, .post h2, .post h3 {
      margin-top: 0;
      color: var(--accent);
      transition: color 0.4s ease;
    }

    code {
      background: var(--code-bg);
      padding: 4px 6px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 0.9em;
      transition: background-color 0.4s ease;
    }

    pre {
      background: var(--code-bg);
      padding: 16px;
      overflow-x: auto;
      border-radius: 8px;
      transition: background-color 0.4s ease;
    }

    pre code {
      background: transparent;
      padding: 0;
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.6;
      font-size: 0.9em;
    }

    .loading, .error {
      text-align: center;
      padding: 20px;
      font-style: italic;
    }
    
    .error { color: #ff6b6b; }
  </style>
</head>

<body>

  <header>
    <h1>AryterLog</h1>
    <button id="theme-btn" aria-label="Cycle Theme">
      <span class="emoji" id="theme-emoji">🌙</span>
      <span id="theme-label">Dark</span>
    </button>
  </header>

  <main class="container" id="posts">
    <div class="loading">Loading posts...</div>
  </main>

  <footer>
    Learning. Building. Breaking. ⚡
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    // --- Cookie Utilities ---
    function setCookie(name, value, days) {
      const date = new Date();
      date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
      document.cookie = `${name}=${value};expires=${date.toUTCString()};path=/`;
    }

    function getCookie(name) {
      const cookieArr = document.cookie.split(";");
      for (let i = 0; i < cookieArr.length; i++) {
        const cookiePair = cookieArr[i].split("=");
        if (name === cookiePair[0].trim()) {
          return decodeURIComponent(cookiePair[1]);
        }
      }
      return null;
    }

    // --- Theme Logic ---
    const themes = ["dark", "light", "eye-saver"];
    const themeData = {
      "dark": { emoji: "🌙", label: "Dark" },
      "light": { emoji: "☀️", label: "Light" },
      "eye-saver": { emoji: "☕", label: "Reading" }
    };

    const themeBtn = document.getElementById("theme-btn");
    const themeEmoji = document.getElementById("theme-emoji");
    const themeLabel = document.getElementById("theme-label");

    // Initialize theme from cookie (fallback to 'dark')
    let currentTheme = getCookie("site_theme") || "dark";
    applyTheme(currentTheme, false);

    // Handle Button Click
    themeBtn.addEventListener("click", () => {
      // Find the next theme in the array
      const currentIndex = themes.indexOf(currentTheme);
      currentTheme = themes[(currentIndex + 1) % themes.length];
      applyTheme(currentTheme, true);
    });

    function applyTheme(themeName, animate) {
      // 1. Apply the CSS class (remove others first)
      document.body.className = themeName === "dark" ? "" : themeName;
      
      // 2. Update text and emoji
      themeEmoji.textContent = themeData[themeName].emoji;
      themeLabel.textContent = themeData[themeName].label;

      // 3. Save to Cookie (valid for 365 days)
      setCookie("site_theme", themeName, 365);

      // 4. Trigger Animation
      if (animate) {
        themeEmoji.style.animation = 'none'; // Reset
        themeEmoji.offsetHeight;             // Trigger reflow to restart animation
        themeEmoji.style.animation = 'popSpin 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
      }
    }

    // --- Posts Logic ---
    const posts = [
      "posts/first-post.md",
      "posts/second-post.md"
    ];

    async function loadPosts() {
      const container = document.getElementById("posts");

      try {
        const fetchPromises = posts.map(post => fetch(post));
        const responses = await Promise.all(fetchPromises);
        
        const textPromises = responses.map(res => {
          if (!res.ok) throw new Error(`Could not load ${res.url}`);
          return res.text();
        });
        const markdownTexts = await Promise.all(textPromises);

        container.innerHTML = ""; // Clear loading text

        markdownTexts.forEach(text => {
          const html = marked.parse(text);
          const article = document.createElement("article");
          article.className = "post";
          article.innerHTML = html;
          container.appendChild(article);
        });

      } catch (error) {
        console.error("Error loading posts:", error);
        container.innerHTML = `<div class="error">Failed to load posts. Please check if the files exist.</div>`;
      }
    }

    loadPosts();
  </script>

</body>
</html>
