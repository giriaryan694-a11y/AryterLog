<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AryterLog</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* --- THEMES --- */
    :root {
      --bg: #0a0e13;
      --text: #c9d1d9;
      --card: #0f1419;
      --card2: #161b22;
      --accent: #39d353;
      --accent2: #1f6feb;
      --border: #21262d;
      --code-bg: #1c2128;
      --input-bg: #0d1117;
      --muted: #8b949e;
      --glow: rgba(57,211,83,0.12);
    }
    .light {
      --bg: #f0f2f5;
      --text: #1c1e21;
      --card: #ffffff;
      --card2: #f8f9fa;
      --accent: #0969da;
      --accent2: #8250df;
      --border: #d0d7de;
      --code-bg: #f6f8fa;
      --input-bg: #ffffff;
      --muted: #57606a;
      --glow: rgba(9,105,218,0.10);
    }
    .eye-saver {
      --bg: #1a1500;
      --text: #e8dcc8;
      --card: #231c08;
      --card2: #2a2210;
      --accent: #f0b429;
      --accent2: #e07b39;
      --border: #3d3418;
      --code-bg: #2a2210;
      --input-bg: #1a1500;
      --muted: #a89060;
      --glow: rgba(240,180,41,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      transition: background 0.35s ease, color 0.35s ease;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* --- SCANLINE EFFECT --- */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* --- HEADER --- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo {
      margin: 0;
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      color: var(--accent);
      letter-spacing: -0.5px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo span { color: var(--text); opacity: 0.5; }

    .header-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    button, .nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      padding: 6px 12px;
      cursor: pointer;
      color: var(--text);
      border-radius: 6px;
      transition: all 0.2s ease;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      white-space: nowrap;
    }
    button:hover, .nav-btn:hover {
      background: var(--glow);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* --- MAIN CONTAINER --- */
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 16px;
      min-height: 70vh;
    }

    /* --- SEARCH --- */
    .search-wrapper {
      margin-bottom: 28px;
      position: relative;
    }
    .search-wrapper::before {
      content: '⌕';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      font-size: 18px;
      pointer-events: none;
    }
    #search-bar {
      width: 100%;
      padding: 12px 16px 12px 40px;
      font-size: 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #search-bar::placeholder { color: var(--muted); }
    #search-bar:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    /* --- POST CARDS --- */
    .posts-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .post-card {
      background: var(--card);
      padding: 20px 22px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .post-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transition: transform 0.2s ease;
      transform-origin: bottom;
    }
    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.2);
      border-color: var(--accent);
    }
    .post-card:hover::before { transform: scaleY(1); }

    .post-card h2 {
      margin: 0 0 6px 0;
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.3;
    }
    .post-card .meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 400;
    }
    .post-card p {
      margin: 0;
      font-size: 13px;
      color: var(--text);
      opacity: 0.8;
      line-height: 1.6;
    }

    .post-card .meta .card-cat-chip {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      vertical-align: middle;
      margin-left: 2px;
    }

    /* --- FULL POST VIEW --- */
    .back-btn { margin-bottom: 20px; }

    .post-content {
      background: var(--card);
      padding: 28px 24px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    /* KEY FIX: All text & code overflow handling */
    .post-content * {
      max-width: 100%;
    }

    .post-content h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(18px, 4vw, 26px);
      color: var(--accent);
      margin: 0 0 8px 0;
      line-height: 1.3;
      word-break: break-word;
    }
    .post-content h2, .post-content h3 {
      font-family: 'Syne', sans-serif;
      color: var(--accent);
      word-break: break-word;
    }

    .post-header-meta {
      opacity: 0.55;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 18px;
      margin-bottom: 22px;
    }

    /* --- CODE BLOCKS: THE MOBILE FIX --- */
    code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      word-break: break-all;     /* break inline code */
      overflow-wrap: break-word;
    }

    pre {
      background: var(--code-bg);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow-x: auto;          /* scroll for code blocks */
      max-width: 100%;
      -webkit-overflow-scrolling: touch;
    }
    pre code {
      background: transparent;
      padding: 0;
      word-break: normal;        /* normal inside pre, let pre scroll */
      overflow-wrap: normal;
      white-space: pre;
      display: block;
      font-size: 13px;
      line-height: 1.6;
    }

    /* --- LINKS & URLS: THE KEY MOBILE FIX --- */
    a {
      color: var(--accent);
      word-break: break-all;     /* break long URLs */
      overflow-wrap: break-word;
    }
    .post-content a {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* blockquote */
    blockquote {
      border-left: 3px solid var(--accent);
      margin: 0;
      padding: 8px 16px;
      background: var(--card2);
      border-radius: 0 6px 6px 0;
      font-style: italic;
      color: var(--muted);
    }

    /* tables */
    table {
      width: 100%;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 13px;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
      white-space: nowrap;
    }
    th { background: var(--card2); color: var(--accent); font-weight: 600; }

    /* images */
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      display: block;
    }

    /* --- HAMBURGER --- */
    .hamburger {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      padding: 6px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .hamburger span {
      display: block;
      width: 100%;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all 0.25s ease;
    }
    .hamburger:hover { border-color: var(--accent); }
    .hamburger:hover span { background: var(--accent); }

    /* --- SIDEBAR OVERLAY --- */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      backdrop-filter: blur(2px);
    }
    .sidebar-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    /* --- SIDEBAR DRAWER --- */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 280px;
      background: var(--card);
      border-right: 1px solid var(--border);
      z-index: 300;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--accent);
      letter-spacing: 0.3px;
    }
    .sidebar-close-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sidebar-close-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--glow); }

    /* --- SIDEBAR COLLAPSIBLE SECTIONS --- */
    .sb-section {
      border-bottom: 1px solid var(--border);
    }
    .sb-section-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      user-select: none;
      transition: color 0.2s;
    }
    .sb-section-toggle:hover { color: var(--text); }
    .sb-arrow {
      font-size: 13px;
      transition: transform 0.25s ease;
      display: inline-block;
    }
    .sb-section.open .sb-arrow { transform: rotate(180deg); }
    .sb-section-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease, padding 0.3s ease;
      padding: 0 20px;
    }
    .sb-section.open .sb-section-body {
      max-height: 60vh;
      overflow-y: auto;
      padding: 0 20px 16px;
    }

    /* --- SOCIAL LINKS --- */
    .social-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .social-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card2);
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s ease;
    }
    .social-link:hover {
      border-color: var(--accent);
      background: var(--glow);
      color: var(--accent);
    }
    .social-icon { font-size: 18px; flex-shrink: 0; }
    .social-info {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }
    .social-name {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
    }
    .social-handle {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .social-ext {
      font-size: 12px;
      opacity: 0.4;
      flex-shrink: 0;
    }
    .social-link:hover .social-ext { opacity: 1; }

    /* --- CATEGORY CHIPS --- */
    .category-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .cat-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
      user-select: none;
    }
    .cat-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--glow);
    }
    .cat-chip.selected {
      border-color: var(--accent);
      background: var(--glow);
      color: var(--accent);
    }
    .cat-chip .cat-count {
      opacity: 0.6;
      font-size: 10px;
    }

    /* Active filter indicator on posts-label */
    .filter-active-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      font-size: 11px;
      color: var(--muted);
    }
    .filter-active-bar .active-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--glow);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }
    .filter-active-bar .active-chip:hover { opacity: 0.75; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .clear-btn {
      width: 100%;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: #f85149; color: #f85149; background: rgba(248,81,73,0.08); }

    /* --- COPY BUTTON --- */
    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 3px 9px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s ease;
      opacity: 0;
      letter-spacing: 0.3px;
    }
    pre:hover .copy-btn { opacity: 1; }
    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--glow);
    }
    .copy-btn.copied {
      border-color: var(--accent);
      color: var(--accent);
      opacity: 1;
    }

    /* --- FOOTER --- */
    footer {
      text-align: center;
      padding: 24px 16px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
    }
    footer span { color: var(--accent); }

    /* --- STATES --- */
    .loading {
      text-align: center;
      padding: 48px 16px;
      color: var(--muted);
      font-size: 13px;
    }
    .loading::before { content: ''; }
    .error { text-align: center; padding: 40px 16px; color: #f85149; font-size: 13px; }
    .hidden { display: none !important; }

    /* --- THEME EMOJI ANIMATION --- */
    @keyframes popSpin {
      0%   { transform: scale(0.5) rotate(-45deg); opacity: 0; }
      60%  { transform: scale(1.2) rotate(8deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .emoji { display: inline-block; }

    /* --- PAGINATION --- */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 28px;
      flex-wrap: wrap;
    }
    .page-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 13px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s ease;
      min-width: 36px;
      text-align: center;
    }
    .page-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--glow);
    }
    .page-btn.active {
      border-color: var(--accent);
      background: var(--glow);
      color: var(--accent);
    }
    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .page-info {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 10px;
      letter-spacing: 0.5px;
    }

    /* --- MOBILE SPECIFIC --- */
    @media (max-width: 480px) {
      header { padding: 12px 14px; gap: 8px; }
      .logo { font-size: 17px; }
      button, .nav-btn { padding: 5px 10px; font-size: 11px; }
      .container { padding: 20px 12px; }
      .post-card { padding: 16px; }
      .post-card h2 { font-size: 15px; }
      .post-content { padding: 18px 14px; }
      pre { padding: 12px; font-size: 12px; }
    }
  </style>
</head>

<body>

  <!-- Sidebar Drawer -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <button id="sidebar-close" class="sidebar-close-btn" aria-label="Close">✕</button>
    </div>
    <!-- Category Section -->
    <div class="sb-section">
      <div class="sb-section-toggle" id="toggle-category">
        <span>Category</span>
        <span class="sb-arrow">▾</span>
      </div>
      <div class="sb-section-body" id="body-category">
        <div id="category-list" class="category-list">
          <span style="color:var(--muted);font-size:12px;">Loading...</span>
        </div>
      </div>
    </div>

    <!-- My Socials Section -->
    <div class="sb-section">
      <div class="sb-section-toggle" id="toggle-socials">
        <span>My Socials</span>
        <span class="sb-arrow">▾</span>
      </div>
      <div class="sb-section-body" id="body-socials">
        <div class="social-list" id="social-list">
          <span style="color:var(--muted);font-size:12px;">Loading...</span>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button id="clear-filters" class="clear-btn">✕ Clear filters</button>
    </div>
  </aside>

  <header>
    <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;">
      <button id="hamburger" class="hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <h1 class="logo" onclick="window.location.hash = ''">AryterLog</h1>
    </div>

    <div class="header-controls">
      <button id="theme-btn" aria-label="Cycle Theme">
        <span class="emoji" id="theme-emoji">🌙</span>
        <span id="theme-label">Dark</span>
      </button>
    </div>
  </header>

  <main class="container">
    <div id="home-view">
      <div class="search-wrapper">
        <input type="text" id="search-bar" placeholder="Search posts...">
      </div>
      <div class="posts-label">// Recent Posts</div>
      <div id="active-filter-bar"></div>
      <div id="post-list"></div>
      <div id="pagination" class="pagination"></div>
      <div id="page-info" class="page-info"></div>
    </div>

    <div id="post-view" class="hidden">
      <button class="back-btn" onclick="window.location.hash = ''">← Back</button>
      <article id="post-content-container" class="post-content"></article>
    </div>
  </main>

  <footer>Learning. Building. Breaking. ⚡ &nbsp;|&nbsp; Made by <span>Aryan Giri</span></footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    /* =========================================
       1. THEME LOGIC
       ========================================= */
    const themes = ["dark", "light", "eye-saver"];
    const themeData = {
      "dark":      { emoji: "🌙", label: "Dark" },
      "light":     { emoji: "☀️",  label: "Light" },
      "eye-saver": { emoji: "☕", label: "Reading" }
    };

    function setCookie(name, value, days) {
      const d = new Date();
      d.setTime(d.getTime() + days * 86400000);
      document.cookie = `${name}=${value};expires=${d.toUTCString()};path=/`;
    }
    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? match[2] : null;
    }

    let currentTheme = getCookie("site_theme") || "dark";
    const themeBtn   = document.getElementById("theme-btn");
    const themeEmoji = document.getElementById("theme-emoji");

    function applyTheme(theme, animate = false) {
      document.body.className = theme === "dark" ? "" : theme;
      themeEmoji.textContent = themeData[theme].emoji;
      document.getElementById("theme-label").textContent = themeData[theme].label;
      setCookie("site_theme", theme, 365);
      if (animate) {
        themeEmoji.style.animation = "none";
        themeEmoji.offsetHeight;
        themeEmoji.style.animation = "popSpin 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards";
      }
    }

    applyTheme(currentTheme);
    themeBtn.addEventListener("click", () => {
      currentTheme = themes[(themes.indexOf(currentTheme) + 1) % themes.length];
      applyTheme(currentTheme, true);
    });

    /* =========================================
       2. SIDEBAR & CATEGORY FILTER
       ========================================= */
    const sidebar         = document.getElementById("sidebar");
    const sidebarOverlay  = document.getElementById("sidebar-overlay");
    const hamburger       = document.getElementById("hamburger");
    const sidebarCloseBtn = document.getElementById("sidebar-close");
    const categoryListEl  = document.getElementById("category-list");
    const clearFiltersBtn = document.getElementById("clear-filters");
    const activeFilterBar = document.getElementById("active-filter-bar");

    let selectedCategories = new Set();

    function openSidebar()  { sidebar.classList.add("open"); sidebarOverlay.classList.add("active"); }
    function closeSidebar() { sidebar.classList.remove("open"); sidebarOverlay.classList.remove("active"); }

    hamburger.addEventListener("click", openSidebar);
    sidebarCloseBtn.addEventListener("click", closeSidebar);
    sidebarOverlay.addEventListener("click", closeSidebar);

    // Collapsible section toggles
    document.querySelectorAll(".sb-section-toggle").forEach(toggle => {
      toggle.addEventListener("click", () => {
        const section = toggle.parentElement;
        section.classList.toggle("open");
      });
    });

    // Sections start closed — user clicks to expand

    function buildCategoryChips() {
      // Count posts per category
      const countMap = {};
      blogPosts.forEach(p => {
        const cats = Array.isArray(p.category) ? p.category : (p.category ? [p.category] : []);
        cats.forEach(c => { countMap[c] = (countMap[c] || 0) + 1; });
      });

      const cats = Object.keys(countMap).sort();
      categoryListEl.innerHTML = "";

      if (!cats.length) {
        categoryListEl.innerHTML = `<span style="color:var(--muted);font-size:12px;">No categories found</span>`;
        return;
      }

      cats.forEach(cat => {
        const chip = document.createElement("div");
        chip.className = "cat-chip" + (selectedCategories.has(cat) ? " selected" : "");
        chip.innerHTML = `${cat} <span class="cat-count">${countMap[cat]}</span>`;
        chip.onclick = () => {
          if (selectedCategories.has(cat)) {
            selectedCategories.delete(cat);
            chip.classList.remove("selected");
          } else {
            selectedCategories.add(cat);
            chip.classList.add("selected");
          }
          renderPostCards(searchBar.value, 1);
        };
        categoryListEl.appendChild(chip);
      });
    }

    clearFiltersBtn.addEventListener("click", () => {
      selectedCategories.clear();
      categoryListEl.querySelectorAll(".cat-chip").forEach(c => c.classList.remove("selected"));
      renderPostCards(searchBar.value, 1);
    });

    function renderActiveFilterBar() {
      activeFilterBar.innerHTML = "";
      if (!selectedCategories.size) return;
      const bar = document.createElement("div");
      bar.className = "filter-active-bar";
      bar.innerHTML = `<span>Filtered by:</span>`;
      selectedCategories.forEach(cat => {
        const chip = document.createElement("span");
        chip.className = "active-chip";
        chip.innerHTML = `${cat} <span>✕</span>`;
        chip.onclick = () => {
          selectedCategories.delete(cat);
          categoryListEl.querySelectorAll(".cat-chip").forEach(c => {
            if (c.textContent.trim().startsWith(cat)) c.classList.remove("selected");
          });
          renderPostCards(searchBar.value, 1);
        };
        bar.appendChild(chip);
      });
      activeFilterBar.appendChild(bar);
    }

    /* =========================================
       3. SEARCH & LIST RENDERING WITH PAGINATION
       ========================================= */
    const listContainer = document.getElementById("post-list");
    const paginationEl  = document.getElementById("pagination");
    const pageInfoEl    = document.getElementById("page-info");
    const searchBar     = document.getElementById("search-bar");
    let blogPosts       = [];
    let currentPage     = 1;
    let currentQuery    = "";
    const POSTS_PER_PAGE = 7;

    function renderPostCards(filterQuery = "", page = 1) {
      currentQuery = filterQuery;
      currentPage  = page;

      listContainer.innerHTML = "";
      paginationEl.innerHTML  = "";
      pageInfoEl.innerHTML    = "";
      renderActiveFilterBar();

      const lq = filterQuery.toLowerCase();
      const filtered = blogPosts.filter(p => {
        const matchesText = p.title.toLowerCase().includes(lq) || p.summary.toLowerCase().includes(lq);
        if (!matchesText) return false;
        if (!selectedCategories.size) return true;
        const postCats = Array.isArray(p.category) ? p.category : (p.category ? [p.category] : []);
        return [...selectedCategories].every(sc => postCats.includes(sc));
      });

      if (!filtered.length) {
        listContainer.innerHTML = `<div class="loading">No posts found${filterQuery ? ` for "<em>${filterQuery}</em>"` : ""}${selectedCategories.size ? " with selected filters" : ""}.</div>`;
        return;
      }

      const totalPages = Math.ceil(filtered.length / POSTS_PER_PAGE);
      currentPage = Math.max(1, Math.min(page, totalPages));

      const start = (currentPage - 1) * POSTS_PER_PAGE;
      const slice = filtered.slice(start, start + POSTS_PER_PAGE);

      slice.forEach(post => {
        const cats = Array.isArray(post.category) ? post.category : (post.category ? [post.category] : []);
        const catHTML = cats.map(c =>
          `<span class="card-cat-chip">${c}</span>`
        ).join("");

        const card = document.createElement("div");
        card.className = "post-card";
        card.onclick = () => window.location.hash = `post-${post.id}`;
        card.innerHTML = `
          <h2>${post.title}</h2>
          <div class="meta">📅 ${post.date}${catHTML ? ` &nbsp;·&nbsp; ${catHTML}` : ""}</div>
          <p>${post.summary}</p>
        `;
        listContainer.appendChild(card);
      });

      if (totalPages > 1) {
        const addBtn = (label, pg, isActive = false, isDisabled = false) => {
          const btn = document.createElement("button");
          btn.className = "page-btn" + (isActive ? " active" : "");
          btn.textContent = label;
          btn.disabled = isDisabled;
          if (!isDisabled) {
            btn.onclick = () => { renderPostCards(currentQuery, pg); window.scrollTo(0,0); };
          }
          paginationEl.appendChild(btn);
        };

        addBtn("←", currentPage - 1, false, currentPage === 1);

        let visiblePages = [];
        if (totalPages <= 3) {
          for (let i = 1; i <= totalPages; i++) visiblePages.push(i);
        } else if (currentPage === 1) {
          visiblePages = [1, 2, 3];
        } else if (currentPage === totalPages) {
          visiblePages = [totalPages - 2, totalPages - 1, totalPages];
        } else {
          visiblePages = [currentPage - 1, currentPage, currentPage + 1];
        }

        visiblePages.forEach(p => addBtn(p, p, p === currentPage));
        addBtn("→", currentPage + 1, false, currentPage === totalPages);

        const from = start + 1;
        const to   = Math.min(start + POSTS_PER_PAGE, filtered.length);
        pageInfoEl.textContent = `Showing ${from}–${to} of ${filtered.length} posts`;
      }
    }

    searchBar.addEventListener("input", e => renderPostCards(e.target.value, 1));

    /* =========================================
       3. ROUTING & FETCHING
       ========================================= */
    const homeView    = document.getElementById("home-view");
    const postView    = document.getElementById("post-view");
    const postContent = document.getElementById("post-content-container");

    marked.setOptions({ breaks: true, gfm: true });

    async function loadFullPost(postId) {
      const meta = blogPosts.find(p => p.id === postId);
      if (!meta) {
        postContent.innerHTML = `<div class="error">⚠️ Post not found.</div>`;
        return;
      }

      postContent.innerHTML = `<div class="loading">⟳ Loading post...</div>`;

      try {
        const res = await fetch(meta.file);
        if (!res.ok) throw new Error("File not found");
        const md = await res.text();

        postContent.innerHTML = `
          <h1>${meta.title}</h1>
          <div class="post-header-meta">📅 Published ${meta.date}</div>
          ${marked.parse(md)}
        `;

        // Open all links in new tab
        postContent.querySelectorAll("a").forEach(link => {
          link.setAttribute("target", "_blank");
          link.setAttribute("rel", "noopener noreferrer");
        });

        // Add copy button to every code block
        postContent.querySelectorAll("pre").forEach(pre => {
          const code = pre.querySelector("code");
          if (!code) return;

          pre.style.position = "relative";

          const btn = document.createElement("button");
          btn.className = "copy-btn";
          btn.textContent = "copy";
          btn.setAttribute("aria-label", "Copy code");

          btn.onclick = async () => {
            try {
              await navigator.clipboard.writeText(code.innerText.trimEnd());
              btn.textContent = "✓ copied";
              btn.classList.add("copied");
              setTimeout(() => {
                btn.textContent = "copy";
                btn.classList.remove("copied");
              }, 2000);
            } catch {
              // Fallback for older browsers
              const sel = window.getSelection();
              const range = document.createRange();
              range.selectNodeContents(code);
              sel.removeAllRanges();
              sel.addRange(range);
              document.execCommand("copy");
              sel.removeAllRanges();
              btn.textContent = "✓ copied";
              btn.classList.add("copied");
              setTimeout(() => {
                btn.textContent = "copy";
                btn.classList.remove("copied");
              }, 2000);
            }
          };

          pre.appendChild(btn);
        });
      } catch (err) {
        postContent.innerHTML = `
          <div class="error">
            <p>⚠️ Could not load post.</p>
            <code>${meta.file}</code>
          </div>`;
      }
    }

    function handleRoute() {
      const hash = window.location.hash;
      if (hash.startsWith("#post-")) {
        homeView.classList.add("hidden");
        postView.classList.remove("hidden");
        loadFullPost(hash.replace("#post-", ""));
        window.scrollTo(0, 0);
      } else {
        postView.classList.add("hidden");
        homeView.classList.remove("hidden");
        // Reset to page 1 when navigating back home
        renderPostCards(searchBar.value, 1);
      }
    }

    function buildSocialLinks(socials) {
      const el = document.getElementById("social-list");
      if (!socials || !socials.length) {
        el.innerHTML = `<span style="color:var(--muted);font-size:12px;">No socials found.</span>`;
        return;
      }
      el.innerHTML = socials.map(s => `
        <a href="${s.url}" target="_blank" rel="noopener noreferrer" class="social-link">
          <span class="social-icon">${s.icon}</span>
          <div class="social-info">
            <span class="social-name">${s.name}</span>
            <span class="social-handle">${s.handle}</span>
          </div>
          <span class="social-ext">↗</span>
        </a>
      `).join("");
    }

    /* =========================================
       4. BOOT — load posts-info.json first
       ========================================= */
    async function init() {
      listContainer.innerHTML = `<div class="loading">⟳ Loading posts...</div>`;
      try {
        const [postsRes, socialsRes] = await Promise.all([
          fetch("posts-info.json"),
          fetch("socials.json")
        ]);
        if (!postsRes.ok) throw new Error("posts-info.json not found");
        blogPosts = await postsRes.json();
        buildCategoryChips();

        if (socialsRes.ok) {
          const socials = await socialsRes.json();
          buildSocialLinks(socials);
        }
      } catch (err) {
        listContainer.innerHTML = `<div class="error">⚠️ Could not load posts-info.json<br><small>${err.message}</small></div>`;
        return;
      }
      window.addEventListener("hashchange", handleRoute);
      handleRoute();
    }

    init();
  </script>
</body>
</html>
