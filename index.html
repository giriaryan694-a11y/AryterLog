<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AryterLog</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* --- THEMES --- */
    :root {
      --bg: #0a0e13;
      --text: #c9d1d9;
      --card: #0f1419;
      --card2: #161b22;
      --accent: #39d353;
      --accent2: #1f6feb;
      --border: #21262d;
      --code-bg: #1c2128;
      --input-bg: #0d1117;
      --muted: #8b949e;
      --glow: rgba(57,211,83,0.12);
    }
    .light {
      --bg: #f0f2f5;
      --text: #1c1e21;
      --card: #ffffff;
      --card2: #f8f9fa;
      --accent: #0969da;
      --accent2: #8250df;
      --border: #d0d7de;
      --code-bg: #f6f8fa;
      --input-bg: #ffffff;
      --muted: #57606a;
      --glow: rgba(9,105,218,0.10);
    }
    .eye-saver {
      --bg: #1a1500;
      --text: #e8dcc8;
      --card: #231c08;
      --card2: #2a2210;
      --accent: #f0b429;
      --accent2: #e07b39;
      --border: #3d3418;
      --code-bg: #2a2210;
      --input-bg: #1a1500;
      --muted: #a89060;
      --glow: rgba(240,180,41,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      transition: background 0.35s ease, color 0.35s ease;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* --- SCANLINE EFFECT --- */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* --- HEADER --- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo {
      margin: 0;
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      color: var(--accent);
      letter-spacing: -0.5px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo span { color: var(--text); opacity: 0.5; }

    .header-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    button, .nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      padding: 6px 12px;
      cursor: pointer;
      color: var(--text);
      border-radius: 6px;
      transition: all 0.2s ease;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      white-space: nowrap;
    }
    button:hover, .nav-btn:hover {
      background: var(--glow);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* --- MAIN CONTAINER --- */
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 16px;
      min-height: 70vh;
    }

    /* --- SEARCH --- */
    .search-wrapper {
      margin-bottom: 28px;
      position: relative;
    }
    .search-wrapper::before {
      content: '⌕';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      font-size: 18px;
      pointer-events: none;
    }
    #search-bar {
      width: 100%;
      padding: 12px 16px 12px 40px;
      font-size: 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #search-bar::placeholder { color: var(--muted); }
    #search-bar:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    /* --- POST CARDS --- */
    .posts-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .post-card {
      background: var(--card);
      padding: 20px 22px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .post-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transition: transform 0.2s ease;
      transform-origin: bottom;
    }
    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.2);
      border-color: var(--accent);
    }
    .post-card:hover::before { transform: scaleY(1); }

    .post-card h2 {
      margin: 0 0 6px 0;
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.3;
    }
    .post-card .meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 400;
    }
    .post-card p {
      margin: 0;
      font-size: 13px;
      color: var(--text);
      opacity: 0.8;
      line-height: 1.6;
    }

    /* --- FULL POST VIEW --- */
    .back-btn { margin-bottom: 20px; }

    .post-content {
      background: var(--card);
      padding: 28px 24px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    /* KEY FIX: All text & code overflow handling */
    .post-content * {
      max-width: 100%;
    }

    .post-content h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(18px, 4vw, 26px);
      color: var(--accent);
      margin: 0 0 8px 0;
      line-height: 1.3;
      word-break: break-word;
    }
    .post-content h2, .post-content h3 {
      font-family: 'Syne', sans-serif;
      color: var(--accent);
      word-break: break-word;
    }

    .post-header-meta {
      opacity: 0.55;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 18px;
      margin-bottom: 22px;
    }

    /* --- CODE BLOCKS: THE MOBILE FIX --- */
    code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      word-break: break-all;     /* break inline code */
      overflow-wrap: break-word;
    }

    pre {
      background: var(--code-bg);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow-x: auto;          /* scroll for code blocks */
      max-width: 100%;
      -webkit-overflow-scrolling: touch;
    }
    pre code {
      background: transparent;
      padding: 0;
      word-break: normal;        /* normal inside pre, let pre scroll */
      overflow-wrap: normal;
      white-space: pre;
      display: block;
      font-size: 13px;
      line-height: 1.6;
    }

    /* --- LINKS & URLS: THE KEY MOBILE FIX --- */
    a {
      color: var(--accent);
      word-break: break-all;     /* break long URLs */
      overflow-wrap: break-word;
    }
    .post-content a {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* blockquote */
    blockquote {
      border-left: 3px solid var(--accent);
      margin: 0;
      padding: 8px 16px;
      background: var(--card2);
      border-radius: 0 6px 6px 0;
      font-style: italic;
      color: var(--muted);
    }

    /* tables */
    table {
      width: 100%;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 13px;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
      white-space: nowrap;
    }
    th { background: var(--card2); color: var(--accent); font-weight: 600; }

    /* images */
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      display: block;
    }

    /* --- FOOTER --- */
    footer {
      text-align: center;
      padding: 24px 16px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
    }
    footer span { color: var(--accent); }

    /* --- STATES --- */
    .loading {
      text-align: center;
      padding: 48px 16px;
      color: var(--muted);
      font-size: 13px;
    }
    .loading::before { content: ''; }
    .error { text-align: center; padding: 40px 16px; color: #f85149; font-size: 13px; }
    .hidden { display: none !important; }

    /* --- THEME EMOJI ANIMATION --- */
    @keyframes popSpin {
      0%   { transform: scale(0.5) rotate(-45deg); opacity: 0; }
      60%  { transform: scale(1.2) rotate(8deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .emoji { display: inline-block; }

    /* --- PAGINATION --- */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 28px;
      flex-wrap: wrap;
    }
    .page-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 13px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s ease;
      min-width: 36px;
      text-align: center;
    }
    .page-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--glow);
    }
    .page-btn.active {
      border-color: var(--accent);
      background: var(--glow);
      color: var(--accent);
    }
    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .page-info {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 10px;
      letter-spacing: 0.5px;
    }

    /* --- MOBILE SPECIFIC --- */
    @media (max-width: 480px) {
      header { padding: 12px 14px; gap: 8px; }
      .logo { font-size: 17px; }
      button, .nav-btn { padding: 5px 10px; font-size: 11px; }
      .container { padding: 20px 12px; }
      .post-card { padding: 16px; }
      .post-card h2 { font-size: 15px; }
      .post-content { padding: 18px 14px; }
      pre { padding: 12px; font-size: 12px; }
    }
  </style>
</head>

<body>

  <header>
    <h1 class="logo" onclick="window.location.hash = ''">AryterLog</h1>

    <div class="header-controls">
      <a href="https://github.com/giriaryan694-a11y" target="_blank" rel="noopener noreferrer" class="nav-btn">
        🐙 GitHub
      </a>
      <a href="https://tryhackme.com/p/giriaryan694a11y" target="_blank" rel="noopener noreferrer" class="nav-btn">
        🎯 THM
      </a>
      <button id="theme-btn" aria-label="Cycle Theme">
        <span class="emoji" id="theme-emoji">🌙</span>
        <span id="theme-label">Dark</span>
      </button>
    </div>
  </header>

  <main class="container">
    <div id="home-view">
      <div class="search-wrapper">
        <input type="text" id="search-bar" placeholder="Search posts...">
      </div>
      <div class="posts-label">// Recent Posts</div>
      <div id="post-list"></div>
      <div id="pagination" class="pagination"></div>
      <div id="page-info" class="page-info"></div>
    </div>

    <div id="post-view" class="hidden">
      <button class="back-btn" onclick="window.location.hash = ''">← Back</button>
      <article id="post-content-container" class="post-content"></article>
    </div>
  </main>

  <footer>Learning. Building. Breaking. ⚡ &nbsp;|&nbsp; Made by <span>Aryan Giri</span></footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    /* =========================================
       1. THEME LOGIC
       ========================================= */
    const themes = ["dark", "light", "eye-saver"];
    const themeData = {
      "dark":      { emoji: "🌙", label: "Dark" },
      "light":     { emoji: "☀️",  label: "Light" },
      "eye-saver": { emoji: "☕", label: "Reading" }
    };

    function setCookie(name, value, days) {
      const d = new Date();
      d.setTime(d.getTime() + days * 86400000);
      document.cookie = `${name}=${value};expires=${d.toUTCString()};path=/`;
    }
    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? match[2] : null;
    }

    let currentTheme = getCookie("site_theme") || "dark";
    const themeBtn   = document.getElementById("theme-btn");
    const themeEmoji = document.getElementById("theme-emoji");

    function applyTheme(theme, animate = false) {
      document.body.className = theme === "dark" ? "" : theme;
      themeEmoji.textContent = themeData[theme].emoji;
      document.getElementById("theme-label").textContent = themeData[theme].label;
      setCookie("site_theme", theme, 365);
      if (animate) {
        themeEmoji.style.animation = "none";
        themeEmoji.offsetHeight;
        themeEmoji.style.animation = "popSpin 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards";
      }
    }

    applyTheme(currentTheme);
    themeBtn.addEventListener("click", () => {
      currentTheme = themes[(themes.indexOf(currentTheme) + 1) % themes.length];
      applyTheme(currentTheme, true);
    });

    /* =========================================
       2. SEARCH & LIST RENDERING WITH PAGINATION
       ========================================= */
    const listContainer = document.getElementById("post-list");
    const paginationEl  = document.getElementById("pagination");
    const pageInfoEl    = document.getElementById("page-info");
    const searchBar     = document.getElementById("search-bar");
    let blogPosts       = [];
    let currentPage     = 1;
    let currentQuery    = "";
    const POSTS_PER_PAGE = 7;

    function renderPostCards(filterQuery = "", page = 1) {
      currentQuery = filterQuery;
      currentPage  = page;

      listContainer.innerHTML = "";
      paginationEl.innerHTML  = "";
      pageInfoEl.innerHTML    = "";

      const lq = filterQuery.toLowerCase();
      const filtered = blogPosts.filter(p =>
        p.title.toLowerCase().includes(lq) ||
        p.summary.toLowerCase().includes(lq)
      );

      if (!filtered.length) {
        listContainer.innerHTML = `<div class="loading">No posts found for "<em>${filterQuery}</em>"</div>`;
        return;
      }

      const totalPages = Math.ceil(filtered.length / POSTS_PER_PAGE);
      // clamp page
      currentPage = Math.max(1, Math.min(page, totalPages));

      const start = (currentPage - 1) * POSTS_PER_PAGE;
      const slice = filtered.slice(start, start + POSTS_PER_PAGE);

      slice.forEach(post => {
        const card = document.createElement("div");
        card.className = "post-card";
        card.onclick = () => window.location.hash = `post-${post.id}`;
        card.innerHTML = `
          <h2>${post.title}</h2>
          <div class="meta">📅 ${post.date}</div>
          <p>${post.summary}</p>
        `;
        listContainer.appendChild(card);
      });

      // Only render pagination if more than one page
      if (totalPages > 1) {
        const addBtn = (label, page, isActive = false, isDisabled = false) => {
          const btn = document.createElement("button");
          btn.className = "page-btn" + (isActive ? " active" : "");
          btn.textContent = label;
          btn.disabled = isDisabled;
          if (!isDisabled) {
            btn.onclick = () => { renderPostCards(currentQuery, page); window.scrollTo(0,0); };
          }
          paginationEl.appendChild(btn);
        };

        // ← prev
        addBtn("←", currentPage - 1, false, currentPage === 1);

        // Sliding window of 3 page numbers
        let visiblePages = [];
        if (totalPages <= 3) {
          for (let i = 1; i <= totalPages; i++) visiblePages.push(i);
        } else if (currentPage === 1) {
          visiblePages = [1, 2, 3];
        } else if (currentPage === totalPages) {
          visiblePages = [totalPages - 2, totalPages - 1, totalPages];
        } else {
          visiblePages = [currentPage - 1, currentPage, currentPage + 1];
        }

        visiblePages.forEach(p => addBtn(p, p, p === currentPage));

        // → next
        addBtn("→", currentPage + 1, false, currentPage === totalPages);

        // Page info text
        const from = start + 1;
        const to   = Math.min(start + POSTS_PER_PAGE, filtered.length);
        pageInfoEl.textContent = `Showing ${from}–${to} of ${filtered.length} posts`;
      }
    }

    // Reset to page 1 on new search
    searchBar.addEventListener("input", e => renderPostCards(e.target.value, 1));

    /* =========================================
       3. ROUTING & FETCHING
       ========================================= */
    const homeView    = document.getElementById("home-view");
    const postView    = document.getElementById("post-view");
    const postContent = document.getElementById("post-content-container");

    marked.setOptions({ breaks: true, gfm: true });

    async function loadFullPost(postId) {
      const meta = blogPosts.find(p => p.id === postId);
      if (!meta) {
        postContent.innerHTML = `<div class="error">⚠️ Post not found.</div>`;
        return;
      }

      postContent.innerHTML = `<div class="loading">⟳ Loading post...</div>`;

      try {
        const res = await fetch(meta.file);
        if (!res.ok) throw new Error("File not found");
        const md = await res.text();

        postContent.innerHTML = `
          <h1>${meta.title}</h1>
          <div class="post-header-meta">📅 Published ${meta.date}</div>
          ${marked.parse(md)}
        `;
      } catch (err) {
        postContent.innerHTML = `
          <div class="error">
            <p>⚠️ Could not load post.</p>
            <code>${meta.file}</code>
          </div>`;
      }
    }

    function handleRoute() {
      const hash = window.location.hash;
      if (hash.startsWith("#post-")) {
        homeView.classList.add("hidden");
        postView.classList.remove("hidden");
        loadFullPost(hash.replace("#post-", ""));
        window.scrollTo(0, 0);
      } else {
        postView.classList.add("hidden");
        homeView.classList.remove("hidden");
        // Reset to page 1 when navigating back home
        renderPostCards(searchBar.value, 1);
      }
    }

    /* =========================================
       4. BOOT — load posts-info.json first
       ========================================= */
    async function init() {
      listContainer.innerHTML = `<div class="loading">⟳ Loading posts...</div>`;
      try {
        const res = await fetch("posts-info.json");
        if (!res.ok) throw new Error("posts-info.json not found");
        blogPosts = await res.json();
      } catch (err) {
        listContainer.innerHTML = `<div class="error">⚠️ Could not load posts-info.json<br><small>${err.message}</small></div>`;
        return;
      }
      window.addEventListener("hashchange", handleRoute);
      handleRoute();
    }

    init();
  </script>
</body>
</html>
