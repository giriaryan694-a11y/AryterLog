<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AryterLog</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0d1117;
  --text: #e6edf3;
  --card: #161b22;
  --accent: #3fb950;
}

.light {
  --bg: #ffffff;
  --text: #111;
  --card: #f5f5f5;
  --accent: #007bff;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  border-bottom: 1px solid #30363d;
}

h1 {
  margin: 0;
  font-size: 22px;
}

button {
  background: var(--card);
  border: none;
  padding: 8px 12px;
  cursor: pointer;
  color: var(--text);
  border-radius: 6px;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.post {
  background: var(--card);
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
  transition: 0.2s;
}

.post:hover {
  transform: translateY(-3px);
}

.post h1, .post h2 {
  margin-top: 0;
}

code {
  background: #222;
  padding: 3px 6px;
  border-radius: 5px;
}

pre {
  background: #0d1117;
  padding: 10px;
  overflow-x: auto;
  border-radius: 8px;
}

.light pre {
  background: #eee;
}

footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
}
</style>
</head>

<body>

<header>
  <h1>AryterLog</h1>
  <button onclick="toggleTheme()">🌗 Theme</button>
</header>

<div class="container" id="posts"></div>

<footer>
  Learning. Building. Breaking. ⚡
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
// Theme toggle
function toggleTheme() {
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

// Load saved theme
if (localStorage.getItem("theme") === "light") {
  document.body.classList.add("light");
}

// Posts list
const posts = [
  "posts/first-post.md",
  "posts/second-post.md"
];

async function loadPosts() {
  const container = document.getElementById("posts");

  for (let post of posts) {
    const res = await fetch(post);
    const text = await res.text();

    const html = marked.parse(text);

    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = html;

    container.appendChild(div);
  }
}

loadPosts();
</script>

</body>
</html>
